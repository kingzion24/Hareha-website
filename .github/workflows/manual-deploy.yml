name: Manual Flutter Web Deployment

# 1. The Trigger
on:
  workflow_dispatch: 

# 2. Required Permissions
permissions:
  contents: read
  pages: write
  id-token: write

# 3. Concurrency
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        # Tells the runner to go into your specific folder first
        working-directory: ./hareha-website/hareha
        run: flutter pub get

      - name: Build Web Application
        # Tells the runner to build from inside that folder
        working-directory: ./hareha-website/hareha
        run: flutter build web --release

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Points to the exact nested location of the new build
          path: './hareha-website/hareha/build/web'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
